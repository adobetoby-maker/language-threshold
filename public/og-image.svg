<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Grain texture -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.04"/>

  <!-- Decorative arch -->
  <path d="M600 80 C600 80 420 80 420 280 L420 580" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.18"/>
  <path d="M600 80 C600 80 780 80 780 280 L780 580" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.18"/>
  <line x1="600" y1="280" x2="600" y2="580" stroke="#C9A84C" stroke-width="1" stroke-dasharray="6 8" opacity="0.12"/>

  <!-- Arch mark (doorway icon) -->
  <g transform="translate(542, 160)">
    <path d="M2 120V52C2 27.147 13.49 8 27.5 8C41.51 8 53 27.147 53 52V120" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" fill="none"/>
    <line x1="2" y1="120" x2="53" y2="120" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <line x1="27.5" y1="52" x2="27.5" y2="120" stroke="#C9A84C" stroke-width="2" stroke-dasharray="4 5" stroke-linecap="round"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#F7F3EC" text-anchor="middle" letter-spacing="-1">Language Threshold</text>

  <!-- Tagline -->
  <text x="600" y="398" font-family="Georgia, serif" font-size="26" font-style="italic" fill="#C9A84C" text-anchor="middle">Cross the threshold. Speak the language.</text>

  <!-- Sub-tagline -->
  <text x="600" y="456" font-family="Arial, sans-serif" font-size="18" fill="#A89F94" text-anchor="middle" letter-spacing="1">AI-powered language training for professionals in the field</text>

  <!-- Bottom rule -->
  <line x1="480" y1="490" x2="720" y2="490" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- Domain -->
  <text x="600" y="524" font-family="Arial, sans-serif" font-size="14" fill="#7A7068" text-anchor="middle" letter-spacing="2">LANGUAGETHRESHOLD.COM</text>
</svg>
